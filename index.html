<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>__OG_TITLE__</title>
    <meta name="description" content="__OG_DESCRIPTION__" />

    <!-- Open Graph / Telegram / WhatsApp / VK -->
    <meta property="og:type" content="website" />

    <meta property="og:title" content="__OG_TITLE__" />

    <meta property="og:image" content="__OG_IMAGE__" />
    <meta property="og:image:secure_url" content="__OG_IMAGE__" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="NeoNet — международная инфраструктура ВЭД" />
    <meta property="og:locale" content="ru_RU" />
    <link rel="image_src" href="__OG_IMAGE__" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="__OG_TITLE__" />
    <meta name="twitter:description" content="__OG_DESCRIPTION__" />
    <meta name="twitter:image" content="__OG_IMAGE__" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
